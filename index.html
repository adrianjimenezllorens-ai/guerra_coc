<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="src/style.css" />

    <!-- LIBRERIAS GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script type="module" src="src/main.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>guerra_coc</title>
  </head>

  <body class="bg-black">


    <!-- INICIO -->
     <div class="h-screen flex items-center justify-center bg-slate-800 text-white font-bold">
        <h1 class="text-3xl" >Scrollea para aprender a atacar en Clash of Clans ↓</h1>
     </div>



     <!-- SECCION DE CARGA (PANTALLA 1)-->
     <section class="revelar_loading_screen flex h-screen m-0 relative">

        <div class="w-full h-full" id="revelar_loading_screen">
          <img class="w-full h-full object-cover" src="public/loading_screen.png" alt="loading screen">
        </div>

        <!-- CAJA1 ARRIBA DE IMAGEN -->
        <div id="caja1" class="absolute flex top-10 left-0 w-full justify-center">
          
          <!-- Añadí un contenedor para meter el título y los autores -->
          <div class="flex flex-col items-center">

            <p class="text-white text-4xl font-bold opacity-0 border-2 border-yellow-500 p-6 rounded-lg">
              Como atacar en las guerras de clanes
            </p>

            <!-- NUESTROS NOMBRES -->
            <div id="autores" class="mt-6 text-center opacity-0">
              <p class="text-yellow-300 font-semibold text-xl">Hecho por:</p>
              <p class="text-white text-2xl font-bold">Adrián Jiménez Llorens</p>
              <p class="text-white text-2xl font-bold">Saúl Martín Voisin</p>
            </div>

          </div>
        </div>

     </section>


     <!-- SECCION DE ALDEA (PANTALLA 2)-->
     <section class="pantalla2 flex h-screen m-0 relative">

      <div class="w-full h-full" id="aldea">
          <img class="w-full h-full object-cover" src="public/aldea.jpeg" alt="aldea">
      </div>

        <!-- OSCURECER FONDO -->
        <div id="overlay-oscuro" class="absolute inset-0 bg-black opacity-0 pointer-events-none">
        </div>

        <!-- IMAGEN BARBARO IZQUIERDA -->
        <div id="imagen-izquierda" class="absolute bottom-0 left-8 opacity-0">
          <img src="public/barbaro.png" class="h-112.5 object-contain">
        </div>

        <!-- IMAGEN ARQUERA DERECHA -->
        <div id="imagen-derecha" class="absolute bottom-0 right-8 opacity-0">
          <img src="public/arquera.png" class="h-112.5 object-contain">
        </div>


        <!-- BOCADILLO BARBARO -->
      <div id="bocadillo-barbaro" class="absolute bottom-120 left-24 opacity-0 scale-0 bg-white text-black p-4 rounded-2xl border-4 border-blue-500 max-w-xs shadow-xl z-20">
        <p id="texto-barbaro" class="font-bold text-lg"></p>
        <div class="absolute -bottom-4 left-6 w-0 h-0 border-l-15 border-l-transparent border-r-15 border-r-transparent border-t-20 border-t-blue-500"></div>
      </div>

      <!-- BOCADILLO ARQUERA -->
      <div id="bocadillo-arquera" class="absolute bottom-120 right-24 opacity-0 scale-0 bg-white text-black p-4 rounded-2xl border-4 border-pink-500 max-w-xs shadow-xl z-20">
        <p id="texto-arquera" class="font-bold text-lg"></p>
        <div class="absolute -bottom-4 right-6 w-0 h-0 border-l-15 border-l-transparent border-r-15 border-r-transparent border-t-20 border-t-pink-500"></div>
      </div>

        <!-- DRAGON ELECTRICO -->
        <div id="dragon-electrico" class="absolute inset-0 flex items-center justify-center opacity-0">
          <img src="public/dragon_electrico.png" class="h-137.5 object-contain">        
        </div>

        <!-- IMAGEN MEJORA IZQUIERDA -->
        <div id="mejora-izquierda" class="absolute left-1/3 top-1/2 -translate-x-1/2 -translate-y-1/2 opacity-0">
          <img src="public/mejora1.png" class="h-55 object-contain">
        </div>

        <!-- IMAGEN MEJORA CENTRO -->
        <div id="mejora-centro" class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 opacity-0">
          <img src="public/mejora2.png" class="h-55 object-contain">
        </div>

        <!-- IMAGEN MEJORA DERECHA -->
        <div id="mejora-derecha" class="absolute left-2/3 top-1/2 -translate-x-1/2 -translate-y-1/2 opacity-0">
          <img src="public/mejora3.png" class="h-55 object-contain">
        </div>

    </section>



    <!-- SECCION DE GUERRA (PANTALLA 3)-->
    <section class="guerra_screen_1 flex h-screen m-0 relative">

      <div class="w-full h-full z-0" id="guerra">
        <img class="w-full h-full object-cover" src="public/guerra_screen_1.jpg" alt="guerra">
      </div>

      <!-- IMAGEN BARBARO IZQUIERDA -->
      <div id="imagen-izquierda-guerra" class="absolute bottom-0 left-8 opacity-0 z-10">
        <img src="public/barbaro.png" class="h-112.5 object-contain">
      </div>

      <!-- IMAGEN ARQUERA DERECHA -->
      <div id="imagen-derecha-guerra" class="absolute bottom-0 right-8 opacity-0 z-10">
        <img src="public/arquera.png" class="h-112.5 object-contain">
      </div>

      <!-- BOCADILLO BARBARO -->
      <div id="bocadillo-barbaro-guerra" class="absolute bottom-120 left-24 opacity-0 scale-0 bg-white text-black p-4 rounded-2xl border-4 border-blue-500 max-w-xs shadow-xl z-20">
        <p id="texto-barbaro-guerra" class="font-bold text-lg"></p>
        <div class="absolute -bottom-4 left-6 w-0 h-0 border-l-15 border-l-transparent border-r-15 border-r-transparent border-t-20 border-t-blue-500"></div>
      </div>

      <!-- BOCADILLO ARQUERA -->
      <div id="bocadillo-arquera-guerra" class="absolute bottom-120 right-24 opacity-0 scale-0 bg-white text-black p-4 rounded-2xl border-4 border-pink-500 max-w-xs shadow-xl z-20">
        <p id="texto-arquera-guerra" class="font-bold text-lg"></p>
        <div class="absolute -bottom-4 right-6 w-0 h-0 border-l-15 border-l-transparent border-r-15 border-r-transparent border-t-20 border-t-pink-500"></div>
      </div>

      <!-- FLECHA SEÑALANDO ALDEA -->
      <div id="flecha-aldea" class="absolute top-[45%] left-[55%] opacity-0 z-30">
        <img src="public/flecha_roja.png" class="h-20 object-contain">
      </div>

    </section>



        <!-- SECCION DE GUERRA2 (PANTALLA 4)-->
    <section class="guerra_screen_2 flex h-screen m-0 relative">

      <div class="w-full h-full z-0" id="guerra2">
        <img class="w-full h-full object-cover" src="public/guerra_screen_2.jpg" alt="guerra">
      </div>

      <!-- IMAGEN BARBARO IZQUIERDA -->
      <div id="imagen-izquierda-guerra2" class="absolute bottom-0 left-8 opacity-0 z-10">
        <img src="public/barbaro.png" class="h-112.5 object-contain">
      </div>

      <!-- IMAGEN ARQUERA DERECHA -->
      <div id="imagen-derecha-guerra2" class="absolute bottom-0 right-8 opacity-0 z-10">
        <img src="public/arquera.png" class="h-112.5 object-contain">
      </div>

      <!-- BOCADILLO BARBARO -->
      <div id="bocadillo-barbaro-guerra2" class="absolute bottom-120 left-24 opacity-0 scale-0 bg-white text-black p-4 rounded-2xl border-4 border-blue-500 max-w-xs shadow-xl z-20">
        <p id="texto-barbaro-guerra2" class="font-bold text-lg"></p>
        <div class="absolute -bottom-4 left-6 w-0 h-0 border-l-15 border-l-transparent border-r-15 border-r-transparent border-t-20 border-t-blue-500"></div>
      </div>

      <!-- BOCADILLO ARQUERA -->
      <div id="bocadillo-arquera-guerra2" class="absolute bottom-120 right-24 opacity-0 scale-0 bg-white text-black p-4 rounded-2xl border-4 border-pink-500 max-w-xs shadow-xl z-20">
        <p id="texto-arquera-guerra2" class="font-bold text-lg"></p>
        <div class="absolute -bottom-4 right-6 w-0 h-0 border-l-15 border-l-transparent border-r-15 border-r-transparent border-t-20 border-t-pink-500"></div>
      </div>

      <!-- FLECHA SEÑALANDO ALDEA -->
      <div id="flecha-aldea2" class="absolute top-[45%] left-[55%] opacity-0 z-30">
        <img src="public/flecha_roja.png" class="h-20 object-contain">
      </div>

    </section>

  </body>
</html>
